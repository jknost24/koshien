// ── Schedule helpers ──────────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
const CURRENT_YEAR = new Date().getFullYear(); // computed once at load
function regionStatus(r, qualifier, year) {
  const t = today();
  if (year && year < CURRENT_YEAR) {
    return qualifier?.winner ? "complete" : "in-progress";
  }
  // Only trust winner field if final date has passed (prevents premature completion)
  const finalPassed = r.finalDate && t >= r.finalDate;
  if (qualifier?.winner && finalPassed) return "complete";
  if (r.startDate && t >= r.startDate) return "in-progress";
  if (r.drawDate && t >= r.drawDate) return "picks-open";
  return "pre-draw";
}
function picksAvailable(r, year) {
  if (year && year < CURRENT_YEAR) return true;
  const t = today();
  if (!r.drawDate) return false;
  if (t < r.drawDate) return false;       // draw hasn't happened
  if (r.startDate && t >= r.startDate) return false; // games started
  return true;
}
function picksLocked(r, year) {
  if (year && year < CURRENT_YEAR) return true; // past seasons always locked
  const t = today();
  return !!(r.startDate && t >= r.startDate);
}

async function sendPicksNotification(regionName, members) {
  if (!EMAILJS_SERVICE_ID) return;
  const emails = members.map(m => m.email).filter(Boolean).join(", ");
  if (!emails) return;
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      region_name: regionName,
      bcc_emails:  emails,
      app_link:    "https://jknost24.github.io/koshien",
    }, EMAILJS_PUBLIC_KEY);
    console.log("Notification sent for", regionName);
  } catch(e) { console.warn("Email notification failed:", e); }
}

// ── API fetch ─────────────────────────────────────────────────────────────────
async function fetchBracketFromClaude(region, year) {
  const prefName = region.prefecture;
  const suffix = region.id.includes("north") ? "North" : region.id.includes("south") ? "South" : "";
  const qual = suffix ? `${prefName} ${suffix}` : prefName;

  const gamesStarted = region.startDate && today() >= region.startDate;
  const scrapeToken = getScrapeKey();

  // Fetch a URL via Scrape.do and strip HTML to plain text
  async function scrapePage(url, renderJs=false) {
    const encoded = encodeURIComponent(url);
    const renderParam = renderJs ? "&render=true" : "";
    const res = await fetch(`https://api.scrape.do/?token=${scrapeToken}&url=${encoded}${renderParam}`);
    if (!res.ok) throw new Error(`Scrape.do error ${res.status} for ${url}`);
    const html = await res.text();
    // Strip to plain text to minimize tokens sent to Sonnet
    return html
      .replace(/<script[\s\S]*?<\/script>/gi, "")
      .replace(/<style[\s\S]*?<\/style>/gi, "")
      .replace(/<nav[\s\S]*?<\/nav>/gi, "")
      .replace(/<header[\s\S]*?<\/header>/gi, "")
      .replace(/<footer[\s\S]*?<\/footer>/gi, "")
      .replace(/<!--[\s\S]*?-->/g, "")
      .replace(/<[^>]+>/g, " ")
      .replace(/&[a-z]+;/gi, " ")
      .replace(/\s+/g, " ")
      .trim();
  }
  const context = gamesStarted
    ? `The ${year} ${qual} summer qualifier is underway. Find completed game results, scores, and winner if known.`
    : `The ${year} ${qual} summer qualifier draw has happened but games have not started yet. Find all participating teams and bracket sections/blocks.`;

  const jsonTemplate = `{"prefecture":"${qual}","year":${year},"winner":null,"winner_ja":null,"source":"TOURNAMENT_PAGE_URL","drawArticleUrl":"DRAW_ARTICLE_URL","confidence":"high","sections":[{"name":"Block A","teams":["Seed1","Team1","Team2","Team3"]},{"name":"Block B","teams":["Seed2","Team4","Team5","Team6"]}],"rounds":[{"name":"Round 1","games":[{"team1":"Name","team1_ja":"日本語","score1":null,"team2":"Name","team2_ja":"日本語","score2":null,"winner":null}]}]}`;

  // Only cache the tournament URL (stable all season)
  // Draw article URL is always derived fresh from the tournament page to avoid caching the wrong one
  const urlCachePath = fbPath.urlCache(year, region.id);
  let savedTournamentUrl = "";
  try {
    const cached = await fb.get(urlCachePath);
    savedTournamentUrl = cached?.tournamentUrl || "";
  } catch(e) {
    savedTournamentUrl = localStorage.getItem(`koshien:${year}:tournamentUrl:${region.id}`) || "";
  }

  // Helper: extract draw article URL from already-fetched tournament page text
  function findDrawArticleUrl(pageText) {
    try {
      const match = pageText.match(/hb-nippon\.com\/articles\/(\d+)/g);
      if (!match) return "";
      // Deduplicate, take most recent article number (highest ID = most recent)
      const ids = [...new Set(match.map(u => parseInt(u.match(/\d+/)[0])))];
      ids.sort((a, b) => b - a); // descending — highest ID first
      return ids.length ? `https://www.hb-nippon.com/articles/${ids[0]}` : "";
    } catch(e) { return ""; }
  }

  // ── Fetch page content via Scrape.do, then pass to Sonnet for extraction ─────
  // Scrape.do handles CORS + JS rendering — Sonnet does extraction/romanization

  let pageContent = "";
  let usedSource = "";

  if (savedTournamentUrl && scrapeToken) {
    try {
      if (!gamesStarted) {
        // Picks window: fetch tournament page first, extract draw article URL from it
        const tournHtml = await scrapePage(savedTournamentUrl);
        const drawArticleUrl = findDrawArticleUrl(tournHtml);

        if (drawArticleUrl) {
          // Fetch draw article for team list (follow pagination)
          let articleHtml = await scrapePage(drawArticleUrl);
          pageContent = articleHtml.slice(0, 20000);
          for (let p = 2; p <= 5; p++) {
            if (!articleHtml.includes(`page=${p}`) && !articleHtml.includes("次のページ")) break;
            try {
              const nextHtml = await scrapePage(`${drawArticleUrl}?page=${p}`);
              if (nextHtml.length < 200) break;
              pageContent += "\n\n--- PAGE " + p + " ---\n" + nextHtml.slice(0, 10000);
              articleHtml = nextHtml;
            } catch(e) { break; }
          }
          usedSource = drawArticleUrl;
        }
        // Always include tournament page content too
        pageContent += "\n\n--- TOURNAMENT PAGE ---\n" + tournHtml.slice(0, 8000);
        if (!usedSource) usedSource = savedTournamentUrl;
      } else {
        // Games started: fetch tournament page for results
        const tournHtml = await scrapePage(savedTournamentUrl, false);
        pageContent = tournHtml.slice(0, 20000);
        usedSource = savedTournamentUrl;
      }
    } catch(e) {
      console.warn("Scrape.do fetch failed:", e.message, "— falling back to web search");
    }
  }

  // Log fetch path for debugging
  console.log(pageContent.length > 200
    ? `Scrape.do: ${pageContent.length} chars`
    : `Web search fallback (scrapeToken:${!!scrapeToken} url:${!!savedTournamentUrl})`);

  let messages, tools;

  if (pageContent.length > 200) {
    // We have page content from Scrape.do — pass directly to Sonnet for extraction
    messages = [{ role: "user", content:
      `${context}

Below is text extracted from hb-nippon.com for the ${qual} ${year} summer qualifier bracket. Extract ALL bracket data carefully.

CONTENT:
${pageContent}

EXTRACTION RULES:
1. SEEDED TEAMS (シード校): Look for 第1シード、第2シード、第3シード、第4シード or any シード label. These teams have byes — they do NOT play in round 1. They MUST appear in sections[] at the top of their block. Most prefectures have 4 seeds.
2. FIRST ROUND MATCHUPS: Extract every pair of teams playing each other. Do not stop early.
3. BRACKET SECTIONS (CRITICAL): sections[] MUST always be populated. If block groupings (Aブロック etc.) are visible, use them. If not, create 4 sections named "Block A" through "Block D" and distribute ALL teams evenly — seeded teams go at the top of their block, round 1 teams fill the rest. sections[] must never be empty.
4. TEAM NAMES: Romanize ALL Japanese school names using Hepburn romanization. 高校→Ko, 商業→Shogyo, 工業→Kogyo, 農業→Nogyo, 尚学→Shogaku, 水産→Suisan.
5. Total teams: large prefectures (Okinawa, Aichi, Osaka) 50+ teams; small prefectures (Tottori, Shimane, Kochi) 15-20 teams. Extract ALL.

Return ONLY valid JSON (no markdown, no explanation, no backticks):
${jsonTemplate}

JSON rules:
- source: "${usedSource || savedTournamentUrl || 'hb-nippon.com'}"
- sections: ALL teams grouped by bracket block, including seeded teams
- rounds: only rounds with actual scores/results, ordered earliest first
- winner: null unless tournament is fully complete
- Every team name must be romanized — no Japanese characters in team1/team2 fields
- team1_ja and team2_ja fields should contain the original Japanese name` }];
    tools = null;
  } else {
    // No Scrape.do content — fall back to web search + web_fetch
    const searchQuery = gamesStarted
      ? `hb-nippon.com ${qual} 高校野球 夏 ${year} 地方大会 試合結果`
      : `hb-nippon.com ${qual} 高校野球 夏 ${year} 組み合わせ決定 ブロック 抽選会`;

    messages = [{ role: "user", content:
      `${context}

Search for: ${searchQuery}

Find BOTH pages on hb-nippon.com for ${qual} ${year}:
1. The draw RESULTS article (hb-nippon.com/articles/XXXXX) — published ON the draw day (not before), title contains "組み合わせ決定" (draw decided). This has the actual bracket blocks and first-round matchups. Fetch ALL pages of it (page=2, page=3 etc).
2. The tournament page (hb-nippon.com/tournaments/XXXXX) — contains any results already played.

IMPORTANT: Do NOT use pre-draw preview articles (titles like "抽選シーズン", "抽選日程", or published BEFORE the draw date). Only use the article published ON ${region ? region.drawDate : "draw day"} with "組み合わせ決定" in the title.

Extract ALL bracket data. Look for seeded teams (シード校 / 第1シード etc.) that have byes and don't play in round 1 — include them at the top of their block in sections[]. Extract every first-round matchup pair. sections[] must never be empty — if blocks are not visible, create synthetic blocks distributing all teams evenly.

Return ONLY valid JSON (no markdown, no backticks):
${jsonTemplate}

Rules:
- Romanize ALL team names using Hepburn romanization
- source = tournaments URL, drawArticleUrl = articles URL
- sections: all teams grouped by bracket block, including seeds
- rounds: completed results only, earliest first
- ONLY teams from ${qual} prefecture
- winner: null if not complete` }];
    tools = [
      { type: "web_search_20250305", name: "web_search", max_uses: 2 },
      { type: "web_fetch_20250910", name: "web_fetch", max_uses: 4 }
    ];
  }

  const hasTools = !!tools;
  const apiHeaders = {
    "Content-Type": "application/json",
    "x-api-key": getApiKey(),
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
    ...(hasTools && { "anthropic-beta": "web-fetch-2025-09-10" }),
  };

  let text = "";

  if (hasTools) {
    // Turn 1: let Sonnet search and fetch freely
    const res1 = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: apiHeaders,
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001", // Haiku for search — avoids Sonnet token rate limit
        max_tokens: 3000,
        tools,
        messages,
      }),
    });
    if (!res1.ok) { const e=await res1.json().catch(()=>({})); throw new Error(`API error ${res1.status}: ${e?.error?.message||res1.statusText}`); }
    const data1 = await res1.json();

    // Extract fetched page content from tool results (actual bracket data)
    // Tool results can be nested arrays of content blocks or plain strings
    const toolContent = data1.content
      .filter(b => b.type === "tool_result" || b.type === "server_tool_use" || b.type === "tool_use")
      .map(b => {
        const raw = b.content || b.input || b.output || "";
        if (Array.isArray(raw)) return raw.map(c => (typeof c === "string" ? c : c?.text || "")).join(" ");
        return typeof raw === "string" ? raw : JSON.stringify(raw);
      })
      .join("\n\n")
      .slice(0, 15000);

    // Also grab any text narration in case tool results are empty
    const narration = data1.content.filter(b=>b.type==="text").map(b=>b.text).join("").slice(0, 4000);

    const combinedContent = (toolContent || narration).slice(0, 15000);
    if (!combinedContent.trim()) throw new Error("No content retrieved from web search. Try again.");

    // Turn 2: pure extraction — no tools, no beta header needed
    const turn2Headers = { "Content-Type":"application/json", "x-api-key":getApiKey(), "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" };
    const res2 = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: turn2Headers,
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        system: "Output ONLY valid JSON. No explanation. No markdown. No backticks. Start with { end with }.",
        messages: [
          { role: "user", content: "Extract bracket data from this content and output ONLY the JSON:\n\n" + combinedContent + "\n\nJSON template:\n" + jsonTemplate }
        ],
      }),
    });
    if (!res2.ok) { const e=await res2.json().catch(()=>({})); throw new Error(`API error ${res2.status}: ${e?.error?.message||res2.statusText}`); }
    const data2 = await res2.json();
    text = data2.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  } else {
    // No tools — single call with strict JSON system prompt
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: apiHeaders,
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        system: "You are a data extraction assistant. Output ONLY valid JSON with no explanation, no markdown, no backticks. Start your response with { and end with }.",
        messages,
      }),
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(`API error ${res.status}: ${e?.error?.message||res.statusText}`); }
    const data = await res.json();
    text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  }

  function parseJSON(raw) {
    // Strip markdown fences and control characters
    let t = raw.replace(/```json|```/g,"").replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,"").trim();
    const s=t.indexOf("{"), e=t.lastIndexOf("}");
    if (s===-1||e===-1) throw new Error("No JSON object found in response");
    let j = t.slice(s, e+1);

    // Attempt 1: raw parse
    try { return JSON.parse(j); } catch(e1) {
      console.warn("Raw parse failed:", e1.message, "at pos", e1.message.match(/\d+/)?.[0]);
    }

    // Attempt 2: normalize newlines, tabs, smart quotes
    let j2 = j
      .replace(/\r?\n/g, " ")
      .replace(/\t/g, " ")
      .replace(/[\u2018\u2019]/g, "'")
      .replace(/[\u201C\u201D]/g, '"')
      .replace(/,\s*([}\]])/g, "$1")           // trailing commas
      .replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":') // unquoted keys
      .replace(/:\s*'([^']*)'/g, ': "$1"');   // single-quoted values
    try { return JSON.parse(j2); } catch(e2) {
      console.warn("Repaired parse failed:", e2.message);
    }

    // Attempt 3: extract just winner if full parse fails
    console.error("All parse attempts failed. Raw text:", text.slice(0,500));
    const winnerMatch = text.match(/"winner"\s*:\s*"([^"]+)"/);
    const prefMatch   = text.match(/"prefecture"\s*:\s*"([^"]+)"/);
    if (winnerMatch) {
      return { winner: winnerMatch[1], prefecture: prefMatch?.[1]||"", sections:[], rounds:[], confidence:"low", source:"Partial parse" };
    }
    throw new Error("Could not parse response. Check browser console for raw output.");
  }

  const result = parseJSON(text);

  // Post-parse validation: ensure sections is always populated
  // If Sonnet returned empty sections, build synthetic ones from rounds data
  if (!result.sections || result.sections.length === 0 || !result.sections.some(s => s.teams?.length > 0)) {
    const allTeamNames = new Set();
    (result.rounds||[]).forEach(r => (r.games||[]).forEach(g => {
      if (g.team1) allTeamNames.add(g.team1);
      if (g.team2) allTeamNames.add(g.team2);
    }));
    if (allTeamNames.size > 0) {
      // Split into 4 blocks evenly
      const teamArr = [...allTeamNames].sort();
      const blockSize = Math.ceil(teamArr.length / 4);
      result.sections = ["A","B","C","D"].map((letter, i) => ({
        name: `Block ${letter}`,
        teams: teamArr.slice(i * blockSize, (i + 1) * blockSize)
      })).filter(s => s.teams.length > 0);
      console.log("Built synthetic sections from rounds data:", result.sections.length, "blocks");
    }
  }

  // Only save the tournament URL — draw article is derived fresh each time
  const isRealUrl = u => u && !u.includes("UNKNOWN") && !u.includes("XXXXX") && !u.includes("XXXX") && /\/\d+/.test(u);
  if (isRealUrl(result.source) && result.source.includes("hb-nippon.com/tournaments/")) {
    console.log("Saved tournament URL:", result.source);
    fb.set(fbPath.urlCache(year, region.id), { tournamentUrl: result.source }).catch(() => {
      localStorage.setItem(`koshien:${year}:tournamentUrl:${region.id}`, result.source);
    });
  }

  return result;
}

// ── Score picks against results ───────────────────────────────────────────────
function scorePicks(picks, qualifier) {
  if (!picks || !qualifier) return { qf:0, sf:0, final:0, winner:0, total:0 };
  const winners = { qf:new Set(), sf:new Set(), final:new Set(), winner:null };
  (qualifier.rounds||[]).forEach(round => {
    const n = round.name.toLowerCase();
    const roundWinners = (round.games||[]).map(g=>g.winner).filter(Boolean);
    if (n.includes("quarter")) roundWinners.forEach(w=>winners.qf.add(w));
    else if (n.includes("semi"))  roundWinners.forEach(w=>winners.sf.add(w));
    else if (n.includes("final") && !n.includes("semi")) roundWinners.forEach(w=>winners.final.add(w));
  });
  if (qualifier.winner) winners.winner = qualifier.winner;

  const score = { qf:0, sf:0, final:0, winner:0, total:0 };
  (picks.qf||[]).forEach(t => { if (winners.qf.has(t)) { score.qf += SCORES.qf; score.total += SCORES.qf; } });
  (picks.sf||[]).forEach(t => { if (winners.sf.has(t)) { score.sf += SCORES.sf; score.total += SCORES.sf; } });
  (picks.final||[]).forEach(t => { if (winners.final.has(t)) { score.final += SCORES.final; score.total += SCORES.final; } });
  if (picks.winner && picks.winner === winners.winner) { score.winner = SCORES.winner; score.total += SCORES.winner; }
  return score;
}

// ── Picker component ──────────────────────────────────────────────────────────
function PrefecturePicker({ region, qualifier, currentUser, existingPick, onSubmit, onClose }) {
  const sections = qualifier?.sections || [];
  const allTeams = useMemo(() => {
    const teams = new Set();
    // Always merge from both — sections has seeds, rounds has matchup teams
    sections.forEach(s => (s.teams||[]).forEach(t => { if(t) teams.add(t); }));
    (qualifier?.rounds||[]).forEach(r => (r.games||[]).forEach(g => {
      if(g.team1) teams.add(g.team1);
      if(g.team2) teams.add(g.team2);
    }));
    return [...teams].sort();
  }, [qualifier]);

  // Synthetic sections fallback — if sections missing from data, build one from all teams
  const effectiveSections = useMemo(() => {
    if (sections.length > 0 && sections.some(s => s.teams?.length > 0)) return sections;
    return allTeams.length > 0 ? [{ name: "All Teams", teams: allTeams }] : [];
  }, [sections, allTeams]);

  const [qf, setQf] = useState(new Set(existingPick?.qf||[]));
  const [sf, setSf] = useState(new Set(existingPick?.sf||[]));
  const [fin, setFin] = useState(new Set(existingPick?.final||[]));
  const [win, setWin] = useState(existingPick?.winner||"");
  const [step, setStep] = useState(0); // 0=QF, 1=SF, 2=Final, 3=Winner, 4=Review
  const [submitted, setSubmitted] = useState(false);

  // Steps computed fresh each render so pools always reflect latest selections
  const getSteps = () => [
    { key:"qf",    label:"Quarterfinal",  needed:8,  pool:allTeams,   selected:qf,  setSelected:setQf },
    { key:"sf",    label:"Semifinal",     needed:4,  pool:[...qf],    selected:sf,  setSelected:setSf },
    { key:"final", label:"Final",         needed:2,  pool:[...sf],    selected:fin, setSelected:setFin },
    { key:"winner",label:"Winner",        needed:1,  pool:[...fin],   selected:new Set(win?[win]:[]), setSelected:v=>setWin([...v][0]||"") },
  ];
  const steps = getSteps();
  const cur = steps[step] || null;

  function toggle(team, selected, setSelected, needed) {
    const next = new Set(selected);
    if (next.has(team)) { next.delete(team); }
    else if (next.size < needed) { next.add(team); }
    setSelected(next);
    // cascade: remove downstream picks that are no longer in upstream
    if (step === 0) {
      setSf(prevSf => {
        const newSf = new Set([...prevSf].filter(t => next.has(t)));
        setFin(prevFin => {
          const newFin = new Set([...prevFin].filter(t => newSf.has(t)));
          setWin(w => newFin.has(w) ? w : "");
          return newFin;
        });
        return newSf;
      });
    }
    if (step === 1) {
      // setSelected(next) already called above — just cascade downstream
      setFin(prevFin => {
        const newFin = new Set([...prevFin].filter(t => next.has(t)));
        setWin(w => newFin.has(w) ? w : "");
        return newFin;
      });
    }
    if (step === 2) { setWin(w => next.has(w) ? w : ""); }
  }

  function handleSubmit() {
    const pick = { name:currentUser.name, qf:[...qf], sf:[...sf], final:[...fin], winner:win, submittedAt:new Date().toISOString() };
    onSubmit(pick);
    setSubmitted(true);
  }

  if (submitted) return (
    <div style={{ textAlign:"center", padding:"2rem" }}>
      <i className="ti ti-circle-check" style={{ fontSize:40, color:"#16a34a", display:"block", marginBottom:12 }} />
      <p style={{ margin:0, fontSize:16, fontWeight:500 }}>Picks submitted!</p>
      <p style={{ margin:"6px 0 16px", fontSize:13, color:"#78716c" }}>Good luck {currentUser.name}.</p>
      <Btn onClick={onClose}>Back to bracket</Btn>
    </div>
  );

  const isReview = step === 4;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
      <div style={{ background:"#fff", borderRadius:12, width:"100%", maxWidth:520, maxHeight:"90vh", display:"flex", flexDirection:"column", boxShadow:"0 8px 32px rgba(0,0,0,0.2)" }}>
        {/* Header */}
        <div style={{ padding:"16px 20px", borderBottom:"0.5px solid #e7e5e4" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <p style={{ margin:0, fontWeight:600, fontSize:15 }}>{region.name} — Make your picks</p>
              <p style={{ margin:"2px 0 0", fontSize:12, color:"#78716c" }}>Picks lock when first game starts · {currentUser.name}</p>
            </div>
            <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", fontSize:20, color:"#78716c", lineHeight:1 }}>×</button>
          </div>
          {/* Progress bar */}
          <div style={{ display:"flex", gap:6, marginTop:12 }}>
            {steps.map((s,i) => (
              <div key={s.key} onClick={()=>{ if(i<=step||i===0) setStep(i); }} style={{ flex:1, height:4, borderRadius:2, background:i<=step?"#1c1917":"#e7e5e4", cursor:"pointer" }} title={s.label} />
            ))}
            <div style={{ flex:1, height:4, borderRadius:2, background:step===4?"#16a34a":"#e7e5e4" }} title="Review" />
          </div>
          <div style={{ display:"flex", gap:6, marginTop:4 }}>
            {steps.map((s,i) => <p key={s.key} style={{ flex:1, margin:0, fontSize:10, color:i===step?"#1c1917":"#a8a29e", fontWeight:i===step?600:400 }}>{s.label}</p>)}
            <p style={{ flex:1, margin:0, fontSize:10, color:step===4?"#16a34a":"#a8a29e", fontWeight:step===4?600:400 }}>Review</p>
          </div>
        </div>

        {/* Body */}
        <div style={{ flex:1, overflowY:"auto", padding:"16px 20px" }}>
          {!isReview && cur && (
            <>
              <p style={{ margin:"0 0 12px", fontSize:13, color:"#78716c" }}>
                Select <strong>{cur.needed}</strong> teams you expect to reach the <strong>{cur.label}</strong>.
                {step > 0 && <> Only teams from your {steps[step-1].label} picks are available.</>}
                <span style={{ marginLeft:6, color:cur.selected.size===cur.needed?"#16a34a":"#d97706" }}>{cur.selected.size}/{cur.needed} selected</span>
              </p>
              {effectiveSections.length > 0 && step === 0 ? (
                effectiveSections.map((sec,si) => (
                  <div key={si} style={{ marginBottom:16 }}>
                    <p style={{ margin:"0 0 6px", fontSize:11, fontWeight:600, color:"#78716c", textTransform:"uppercase", letterSpacing:"0.05em" }}>{sec.name}</p>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
                      {(sec.teams||[]).map(team => {
                        const sel = cur.selected.has(team);
                        const full = cur.selected.size >= cur.needed && !sel;
                        return (
                          <div key={team} onClick={()=>!full&&toggle(team,cur.selected,cur.setSelected,cur.needed)} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", borderRadius:6, border:`0.5px solid ${sel?"#1c1917":"#e7e5e4"}`, background:sel?"#1c1917":full?"#fafaf9":"#fff", cursor:full?"not-allowed":"pointer", opacity:full?0.4:1 }}>
                            <input type="checkbox" checked={sel} readOnly style={{ accentColor:"#fff" }} />
                            <span style={{ fontSize:13, color:sel?"#fff":"#1c1917", fontWeight:sel?500:400 }}>{team}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
                  {cur.pool.map(team => {
                    const sel = cur.selected.has(team);
                    const full = cur.selected.size >= cur.needed && !sel;
                    return (
                      <div key={team} onClick={()=>!full&&toggle(team,cur.selected,cur.setSelected,cur.needed)} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", borderRadius:6, border:`0.5px solid ${sel?"#1c1917":"#e7e5e4"}`, background:sel?"#1c1917":full?"#fafaf9":"#fff", cursor:full?"not-allowed":"pointer", opacity:full?0.4:1 }}>
                        <input type="checkbox" checked={sel} readOnly style={{ accentColor:"#fff" }} />
                        <span style={{ fontSize:13, color:sel?"#fff":"#1c1917", fontWeight:sel?500:400 }}>{team}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {isReview && (
            <div>
              <p style={{ margin:"0 0 16px", fontSize:13, color:"#78716c" }}>Review your picks before submitting. Once submitted, picks cannot be changed after the bracket starts.</p>
              {[{label:"Quarterfinal (×"+SCORES.qf+"pts each)", teams:[...qf]},{label:"Semifinal (×"+SCORES.sf+"pts each)", teams:[...sf]},{label:"Final (×"+SCORES.final+"pts each)", teams:[...fin]},{label:"Winner (×"+SCORES.winner+"pts)", teams:win?[win]:[]}].map(row=>(
                <div key={row.label} style={{ marginBottom:12 }}>
                  <p style={{ margin:"0 0 4px", fontSize:11, fontWeight:600, color:"#78716c", textTransform:"uppercase" }}>{row.label}</p>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {row.teams.map(t=><span key={t} style={{ fontSize:13, padding:"4px 10px", background:"#1c1917", color:"#fff", borderRadius:20 }}>{t}</span>)}
                    {!row.teams.length && <span style={{ fontSize:12, color:"#ef4444" }}>No pick made</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding:"12px 20px", borderTop:"0.5px solid #e7e5e4", display:"flex", justifyContent:"space-between", gap:8 }}>
          <Btn onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} color="#78716c"><i className="ti ti-arrow-left" />Back</Btn>
          <div style={{ display:"flex", gap:8 }}>
            {step < 3 && <Btn onClick={()=>setStep(s=>s+1)} disabled={cur&&cur.selected.size<cur.needed} bg="#1c1917" color="#fff">Next <i className="ti ti-arrow-right" /></Btn>}
            {step === 3 && <Btn onClick={()=>setStep(4)} disabled={!win} bg="#1c1917" color="#fff">Review <i className="ti ti-arrow-right" /></Btn>}
            {step === 4 && <Btn onClick={handleSubmit} bg="#16a34a" color="#fff"><i className="ti ti-check" />Submit picks</Btn>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Bracket display ───────────────────────────────────────────────────────────
function GameRow({ game, showJa }) {
  const has = game.score1!==null&&game.score2!==null&&game.score1!==undefined&&game.score2!==undefined;
  const w1 = has&&game.score1>game.score2, w2 = has&&game.score2>game.score1;
  const t1 = showJa?(game.team1_ja||game.team1):game.team1;
  const t2 = showJa?(game.team2_ja||game.team2):game.team2;
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"0.5px solid #e7e5e4" }}>
      <p style={{ margin:0, fontSize:13, textAlign:"right", fontWeight:w1?500:400, color:w1?"#1c1917":"#78716c" }}>{t1}</p>
      <div style={{ display:"flex", alignItems:"center", gap:6, background:"#f5f5f4", borderRadius:6, padding:"2px 10px", fontSize:13, fontWeight:500 }}>
        {has?<><span style={{color:w1?"#1c1917":"#78716c"}}>{game.score1}</span><span style={{color:"#78716c",fontSize:11}}>–</span><span style={{color:w2?"#1c1917":"#78716c"}}>{game.score2}</span></>:<span style={{fontSize:11,color:"#78716c"}}>vs</span>}
      </div>
      <p style={{ margin:0, fontSize:13, fontWeight:w2?500:400, color:w2?"#1c1917":"#78716c" }}>{t2}</p>
    </div>
  );
}

function BracketDisplay({ data, showJa }) {
  const rounds = [...(data.rounds||[])].reverse();
  if (!rounds.length&&!data.winner&&!data.sections?.length) return null; // handled by parent
  return (
    <div>
      {data.winner&&<div style={{display:"flex",alignItems:"center",gap:10,background:"#f0fdf4",borderRadius:10,padding:"12px 16px",marginBottom:16}}><i className="ti ti-trophy" style={{fontSize:18,color:"#16a34a",flexShrink:0}}/><div><p style={{margin:0,fontSize:12,color:"#16a34a"}}>Koshien qualifier</p><p style={{margin:0,fontSize:15,fontWeight:500,color:"#16a34a"}}>{showJa?(data.winner_ja||data.winner):data.winner}</p></div>{data.confidence&&<span style={{marginLeft:"auto",fontSize:11,padding:"2px 8px",borderRadius:6,background:"#f5f5f4",color:"#78716c"}}>{data.confidence} confidence</span>}</div>}
      {rounds.map((round,ri)=>(
        <div key={ri} style={{border:"0.5px solid #e7e5e4",borderRadius:10,marginBottom:12,overflow:"hidden"}}>
          <div style={{padding:"8px 14px",background:"#f5f5f4",borderBottom:"0.5px solid #e7e5e4"}}><p style={{margin:0,fontSize:12,fontWeight:500,color:"#78716c"}}>{round.name} <span style={{fontWeight:400}}>· {round.games?.length||0} game{round.games?.length!==1?"s":""}</span></p></div>
          <div style={{padding:"0 14px"}}>{(round.games||[]).map((g,gi)=><GameRow key={gi} game={g} showJa={showJa}/>)}</div>
        </div>
      ))}
      {data.source&&<p style={{fontSize:11,color:"#78716c",marginTop:8}}><i className="ti ti-link" style={{marginRight:4}}/>Source: {data.source}</p>}
    </div>
  );
}

// ── Region card ───────────────────────────────────────────────────────────────
function RegionCard({ region, qualifier, picks, currentUser, year, onClick }) {
  const status = regionStatus(region, qualifier, year);
  const myPick = picks?.[currentUser?.name];
  const score = myPick ? scorePicks(myPick, qualifier) : null;
  return (
    <div onClick={()=>onClick(region)} style={{background:"#fff",border:"0.5px solid #e7e5e4",borderRadius:10,padding:"12px 16px",cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div><p style={{margin:0,fontWeight:500,fontSize:14,color:"#1c1917"}}>{region.name}</p><p style={{margin:"2px 0 0",fontSize:12,color:"#78716c"}}>{region.region}</p></div>
        <ScheduleBadge status={status} />
      </div>
      {qualifier?.winner&&<p style={{margin:"8px 0 0",fontSize:12,color:"#16a34a",borderTop:"0.5px solid #e7e5e4",paddingTop:8}}><i className="ti ti-trophy" style={{fontSize:13,marginRight:4}}/>{qualifier.winner}</p>}
      {myPick&&<p style={{margin:"6px 0 0",fontSize:11,color:"#2563eb"}}><i className="ti ti-user-check" style={{fontSize:11,marginRight:3}}/>Your pick: <strong>{myPick.winner||"—"}</strong>{score&&score.total>0?` · ${score.total}pts`:""}</p>}
      {!qualifier?.winner&&(region.drawDate||region.startDate)&&<div style={{marginTop:8,borderTop:"0.5px solid #e7e5e4",paddingTop:8}}>{region.drawDate&&<p style={{margin:0,fontSize:11,color:"#78716c"}}><i className="ti ti-calendar" style={{marginRight:3,fontSize:11}}/>Draw: {region.drawDate}</p>}{region.startDate&&<p style={{margin:"2px 0 0",fontSize:11,color:"#78716c"}}><i className="ti ti-flag" style={{marginRight:3,fontSize:11}}/>Starts: {region.startDate}</p>}</div>}
    </div>
  );
}

// ── Region detail ─────────────────────────────────────────────────────────────
function RegionDetail({ region, year, qualifier, picks, currentUser, members, onBack, onSaveQualifier, onSavePick }) {
  const [fetchState, setFetchState] = useState("idle");
  const [fetchedData, setFetchedData] = useState(qualifier||null);
  const [error, setError] = useState(null);
  const [showJa, setShowJa] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const status = regionStatus(region, qualifier, year);
  const isPicksLocked = picksLocked(region, year);
  const bracketAvailable = !!(fetchedData?.sections?.length||fetchedData?.rounds?.length);
  const myPick = picks?.[currentUser?.name];
  const score = myPick ? scorePicks(myPick, qualifier) : null;

  // Reset on region change
  useEffect(() => { setFetchedData(qualifier||null); setFetchState("idle"); setError(null); setShowJa(false); }, [region.id]);
  // Sync with Firebase real-time updates when not actively fetching
  useEffect(() => {
    if (fetchState === "idle" || fetchState === "saved") {
      setFetchedData(qualifier||null);
    }
  }, [qualifier]);

  const handleFetch = async () => {
    setFetchState("loading"); setError(null);
    try {
      const data = await fetchBracketFromClaude(region, year);
      setFetchedData(data);
      // Auto-save to Firebase so all users see the bracket immediately
      await onSaveQualifier(region.id, data);
      setFetchState("saved");
      // Send email notification
      const hasData = (data.sections?.length > 0) || (data.rounds?.length > 0);
      const isFirstFetch = !qualifier; // qualifier prop is null/undefined before first save
      if (hasData && isFirstFetch && members?.length > 0) {
        await sendPicksNotification(region.name, members);
      }
    } catch(e) { setError(e.message); setFetchState("error"); } // preserve existing data on error
  };

  const handlePickSubmit = (pick) => {
    onSavePick(region.id, currentUser.name, pick);
    setShowPicker(false);
  };

  return (
    <div>
      {showPicker && <PrefecturePicker region={region} qualifier={fetchedData||qualifier} currentUser={currentUser} existingPick={myPick} onSubmit={handlePickSubmit} onClose={()=>setShowPicker(false)} />}

      <button onClick={()=>onBack()} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",color:"#78716c",fontSize:13,padding:0,marginBottom:20}}>
        <i className="ti ti-arrow-left" style={{fontSize:14}}/> Back to all prefectures
      </button>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{margin:0,fontSize:18,fontWeight:500}}>{region.name}</h2>
          <p style={{margin:"2px 0 0",fontSize:13,color:"#78716c"}}>{region.region} region · {year} qualifier</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {fetchState==="saved"&&<span style={{fontSize:13,color:"#16a34a",display:"inline-flex",alignItems:"center",gap:4}}><i className="ti ti-check"/>Saved</span>}
          {fetchedData&&<Btn onClick={()=>{onSaveQualifier(region.id,null);setFetchedData(null);setFetchState("idle");}} color="#78716c">Clear</Btn>}
          {fetchedData&&fetchState!=="loading"&&<Btn onClick={()=>setShowJa(j=>!j)} color="#78716c" bg={showJa?"#f5f5f4":"#fff"}><i className="ti ti-language"/>{showJa?"English":"Japanese"}</Btn>}
          <button onClick={handleFetch} disabled={fetchState==="loading"} style={{fontSize:13,padding:"6px 14px",cursor:fetchState==="loading"?"not-allowed":"pointer",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#fff",color:fetchState==="loading"?"#78716c":"#1c1917",display:"inline-flex",alignItems:"center",gap:6, minWidth:120}}>
            <i className={`ti ${fetchState==="loading"?"ti-loader-2":"ti-search"}`}/>{fetchState==="loading"?"Searching…":fetchedData?"Re-fetch":"Fetch bracket"}
          </button>
        </div>
      </div>

      {/* Schedule strip */}
      <div style={{display:"flex",gap:16,marginBottom:16,padding:"10px 14px",background:"#f5f5f4",borderRadius:8,flexWrap:"wrap",alignItems:"center"}}>
        <ScheduleBadge status={status}/>
        {region.drawDate&&<span style={{fontSize:12,color:"#78716c"}}><i className="ti ti-calendar" style={{marginRight:4}}/>Draw: <strong>{region.drawDate}</strong></span>}
        {region.startDate&&<span style={{fontSize:12,color:"#78716c"}}><i className="ti ti-flag" style={{marginRight:4}}/>First game: <strong>{region.startDate}</strong></span>}
        {region.finalDate&&<span style={{fontSize:12,color:"#78716c"}}><i className="ti ti-flag-2" style={{marginRight:4}}/>Final: <strong>{region.finalDate}</strong></span>}
      </div>

      {/* Pick button */}
      {bracketAvailable && picksAvailable(region, year) && currentUser && (
        <div style={{background:"#eff6ff",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div>
            <p style={{margin:0,fontSize:13,fontWeight:500,color:"#1d4ed8"}}>Bracket draw is available — picks are open!</p>
            <p style={{margin:"2px 0 0",fontSize:12,color:"#3b82f6"}}>Picks lock when first game starts on {region.startDate}.</p>
          </div>
          <Btn onClick={()=>setShowPicker(true)} bg="#1d4ed8" color="#fff"><i className="ti ti-pencil"/>{myPick?"Edit picks":"Make picks"}</Btn>
        </div>
      )}
      {!bracketAvailable && !picksAvailable(region, year) && status==="pre-draw" && currentUser && (
        <div style={{background:"#f5f5f4",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <p style={{margin:0,fontSize:13,color:"#78716c"}}><i className="ti ti-clock" style={{marginRight:6}}/>Picks open after the draw on <strong>{region.drawDate||"TBD"}</strong>. Fetch the bracket then to make your picks.</p>
        </div>
      )}
      {isPicksLocked && myPick && (
        <div style={{background:"#f0fdf4",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <p style={{margin:0,fontSize:13,fontWeight:500,color:"#16a34a"}}><i className="ti ti-lock" style={{marginRight:6}}/>Your picks are locked</p>
          <p style={{margin:"4px 0 0",fontSize:12,color:"#16a34a"}}>Winner pick: <strong>{myPick.winner}</strong>{score?.total>0?<> · <strong>{score.total} pts</strong> so far</>:<> · scoring begins when results are fetched</>}</p>
        </div>
      )}

      {/* All members' picks summary */}
      {picks && Object.keys(picks).length > 0 && (
        <div style={{border:"0.5px solid #e7e5e4",borderRadius:10,marginBottom:16,overflow:"hidden"}}>
          <div style={{padding:"8px 14px",background:"#f5f5f4",borderBottom:"0.5px solid #e7e5e4"}}><p style={{margin:0,fontSize:12,fontWeight:500,color:"#78716c"}}>Group picks — winner selections</p></div>
          <div style={{padding:"8px 14px"}}>
            {Object.entries(picks).map(([name, pick]) => {
              const s = scorePicks(pick, qualifier);
              return (
                <div key={name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:"0.5px solid #f5f5f4"}}>
                  <span style={{fontSize:13,color:"#1c1917",fontWeight:name===currentUser?.name?500:400}}>{name}{name===currentUser?.name?" (you)":""}</span>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:13,color:"#78716c"}}>{pick.winner||"—"}</span>
                    {s.total>0&&<span style={{fontSize:12,color:"#16a34a",fontWeight:500}}>{s.total}pts</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {fetchState==="loading"&&<div style={{background:"#f5f5f4",borderRadius:10,padding:"2rem",textAlign:"center"}}><p style={{margin:0,fontSize:13,color:"#78716c"}}>Searching for {region.name} {year} bracket…</p><p style={{margin:"6px 0 0",fontSize:12,color:"#78716c"}}>This may take 15–30 seconds</p></div>}
      {fetchState==="error"&&(
        <div style={{background:"#fef2f2",borderRadius:10,padding:"1.25rem 1.5rem",marginBottom:16}}>
          <p style={{margin:"0 0 8px",fontSize:13,fontWeight:500,color:"#dc2626"}}><i className="ti ti-alert-circle" style={{marginRight:6}}/>Fetch failed</p>
          <p style={{margin:"0 0 12px",fontSize:12,color:"#dc2626"}}>{error}</p>
          {error&&error.includes("429")&&(
            <p style={{margin:"0 0 12px",fontSize:12,color:"#78716c",background:"#fff",borderRadius:6,padding:"8px 12px"}}>
              <i className="ti ti-clock" style={{marginRight:6}}/>Rate limit hit — wait 60 seconds then try again.
            </p>
          )}
          <button onClick={handleFetch} style={{fontSize:13,padding:"6px 16px",cursor:"pointer",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#fff",color:"#1c1917",display:"inline-flex",alignItems:"center",gap:6}}>
            <i className="ti ti-refresh"/>Try again
          </button>
        </div>
      )}
      {fetchedData&&fetchState!=="loading"&&(fetchedData.winner||fetchedData.rounds?.length>0||fetchedData.sections?.length>0)&&<BracketDisplay data={fetchedData} showJa={showJa}/>}
      {fetchedData&&fetchState!=="loading"&&!fetchedData.winner&&!fetchedData.rounds?.length&&!fetchedData.sections?.length&&(
        <div style={{background:"#f5f5f4",borderRadius:10,padding:"2rem",textAlign:"center"}}>
          <i className="ti ti-alert-circle" style={{fontSize:24,color:"#d97706",display:"block",marginBottom:8}}/>
          <p style={{margin:"0 0 16px",fontSize:14,color:"#78716c"}}>Bracket data is empty or incomplete. Try re-fetching.</p>
          <button onClick={handleFetch} style={{fontSize:13,padding:"8px 20px",cursor:"pointer",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#1c1917",color:"#fff",display:"inline-flex",alignItems:"center",gap:6}}>
            <i className="ti ti-refresh"/>Re-fetch bracket
          </button>
        </div>
      )}
      {!fetchedData&&fetchState==="idle"&&(
        <div style={{background:"#f5f5f4",borderRadius:10,padding:"2rem",textAlign:"center"}}>
          <i className="ti ti-search" style={{fontSize:24,color:"#78716c",display:"block",marginBottom:8}}/>
          <p style={{margin:"0 0 16px",fontSize:14,color:"#78716c"}}>No bracket yet. Fetch the draw and results for {region.name} {year}.</p>
          <button onClick={handleFetch} style={{fontSize:13,padding:"8px 20px",cursor:"pointer",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#1c1917",color:"#fff",display:"inline-flex",alignItems:"center",gap:6}}>
            <i className="ti ti-search"/>Fetch bracket
          </button>
        </div>
      )}

    </div>
  );
}

// ── Qualifier grid ─────────────────────────────────────────────────────────────
function QualifierGrid({ year, qualifiers, allPicks, currentUser, onSelectRegion }) {
  const grouped = REGION_GROUPS.map(g=>({group:g,regions:REGIONS.filter(r=>r.region===g)}));
  const complete = REGIONS.filter(r=>regionStatus(r,qualifiers[r.id],year)==="complete").length;
  const picksOpen = REGIONS.filter(r=>regionStatus(r,qualifiers[r.id],year)==="picks-open"&&(qualifiers[r.id]?.sections?.length||qualifiers[r.id]?.rounds?.length)).length;
  const myPickCount = Object.keys(allPicks||{}).reduce((n,rid)=>allPicks[rid]?.[currentUser?.name]?n+1:n,0);
  const t = today();

  // Categorize all regions for the draw tracker
  const drawnFetched   = REGIONS.filter(r => r.drawDate && t >= r.drawDate && !!(qualifiers[r.id]?.sections?.length || qualifiers[r.id]?.rounds?.length));
  const drawnUnfetched = REGIONS.filter(r => r.drawDate && t >= r.drawDate && !(qualifiers[r.id]?.sections?.length || qualifiers[r.id]?.rounds?.length));
  const upcoming       = REGIONS.filter(r => r.drawDate && t < r.drawDate);
  const unknownDate    = REGIONS.filter(r => !r.drawDate);
  const totalRemaining = upcoming.length + unknownDate.length;

  // Group upcoming draws by week
  const weekGroups = {};
  [...drawnFetched, ...drawnUnfetched, ...upcoming].forEach(r => {
    const d = new Date(r.drawDate);
    // Get Monday of that week (non-mutating)
    const day = d.getUTCDay();
    const monday = new Date(r.drawDate);
    monday.setUTCDate(d.getUTCDate() - day + (day === 0 ? -6 : 1));
    const key = monday.toISOString().slice(0,10);
    if (!weekGroups[key]) weekGroups[key] = [];
    weekGroups[key].push(r);
  });
  const sortedWeeks = Object.keys(weekGroups).sort();

  return (
    <div>
      {/* ── Draw Tracker ─────────────────────────────────────────── */}
      <div style={{border:"0.5px solid #e7e5e4",borderRadius:10,marginBottom:24,overflow:"hidden"}}>
        {/* Header tallies */}
        <div style={{padding:"12px 16px",background:"#f5f5f4",borderBottom:"0.5px solid #e7e5e4",display:"flex",alignItems:"center",flexWrap:"wrap"}}>
          <p style={{margin:0,fontSize:13,fontWeight:500,color:"#1c1917",flex:1}}>
            <i className="ti ti-calendar-event" style={{marginRight:6,fontSize:13}}/>Draw tracker — {year} qualifiers
          </p>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#16a34a",fontWeight:500}}><i className="ti ti-check" style={{marginRight:3,fontSize:11}}/>{drawnFetched.length} fetched</span>
            {drawnUnfetched.length>0&&<span style={{fontSize:12,color:"#c2410c",fontWeight:500}}><i className="ti ti-alert-triangle" style={{marginRight:3,fontSize:11}}/>{drawnUnfetched.length} unfetched</span>}
            <span style={{fontSize:12,color:"#78716c"}}><i className="ti ti-clock" style={{marginRight:3,fontSize:11}}/>{totalRemaining} remaining</span>
          </div>
        </div>

        {/* Weekly rows */}
        {sortedWeeks.map(weekKey => {
          const regions = weekGroups[weekKey];
          const weekStart = new Date(weekKey);
          const weekEnd = new Date(weekKey);
          weekEnd.setUTCDate(weekEnd.getUTCDate() + 6);
          const fmt = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
          const weekLabel = `${fmt(weekStart)} – ${fmt(weekEnd)}`;
          return (
            <div key={weekKey} style={{borderBottom:"0.5px solid #e7e5e4"}}>
              <p style={{margin:0,padding:"6px 16px",fontSize:11,fontWeight:600,color:"#78716c",textTransform:"uppercase",letterSpacing:"0.05em",background:"#fafaf9"}}>{weekLabel}</p>
              <div style={{padding:"8px 16px",display:"flex",flexWrap:"wrap",gap:6}}>
                {[...regions].sort((a,b)=>a.drawDate.localeCompare(b.drawDate)).map(r => {
                  const drawn = t >= r.drawDate;
                  const fetched = !!(qualifiers[r.id]?.sections?.length || qualifiers[r.id]?.rounds?.length);
                  const bg    = !drawn ? "#f5f5f4" : fetched ? "#f0fdf4" : "#fff7ed";
                  const color = !drawn ? "#78716c" : fetched ? "#16a34a" : "#c2410c";
                  const border= !drawn ? "#e7e5e4" : fetched ? "#bbf7d0" : "#fed7aa";
                  const icon  = !drawn ? "ti-clock" : fetched ? "ti-check" : "ti-alert-triangle";
                  return (
                    <button key={r.id} onClick={()=>onSelectRegion(r)}
                      title={drawn ? (fetched?"Bracket fetched":"Draw done — bracket needed") : `Draws ${r.drawDate}`}
                      style={{fontSize:12,padding:"4px 10px",borderRadius:6,border:`0.5px solid ${border}`,background:bg,color,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
                      <i className={`ti ${icon}`} style={{fontSize:10}}/>
                      {r.name}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* Unknown date row */}
        {unknownDate.length > 0 && (
          <div style={{borderBottom:"0.5px solid #e7e5e4"}}>
            <p style={{margin:0,padding:"6px 16px",fontSize:11,fontWeight:600,color:"#78716c",textTransform:"uppercase",letterSpacing:"0.05em",background:"#fafaf9"}}>Draw date TBD</p>
            <div style={{padding:"8px 16px",display:"flex",flexWrap:"wrap",gap:6}}>
              {unknownDate.map(r => (
                <button key={r.id} onClick={()=>onSelectRegion(r)}
                  style={{fontSize:12,padding:"4px 10px",borderRadius:6,border:"0.5px solid #e7e5e4",background:"#f5f5f4",color:"#78716c",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
                  <i className="ti ti-help" style={{fontSize:10}}/>{r.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Main Koshien tournament row */}
        <div>
          <p style={{margin:0,padding:"6px 16px",fontSize:11,fontWeight:600,color:"#78716c",textTransform:"uppercase",letterSpacing:"0.05em",background:"#fafaf9"}}>Main tournament — Koshien</p>
          <div style={{padding:"8px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,padding:"4px 10px",borderRadius:6,border:"0.5px solid #e7e5e4",background:"#f5f5f4",color:"#78716c",display:"inline-flex",alignItems:"center",gap:4}}>
                <i className="ti ti-clock" style={{fontSize:10}}/>Draw: Aug 1 · Games: Aug 5–22
              </span>
            </div>
            <span style={{fontSize:11,color:"#a8a29e"}}>49 prefecture winners · Hanshin Koshien Stadium</span>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
        {[{label:"Qualifiers confirmed",value:complete,icon:"ti-trophy"},{label:"Picks open now",value:picksOpen,icon:"ti-pencil"},{label:"Your picks made",value:myPickCount,icon:"ti-user-check"}].map(({label,value,icon})=>(
          <div key={label} style={{background:"#f5f5f4",borderRadius:8,padding:"1rem",textAlign:"center"}}>
            <i className={`ti ${icon}`} style={{fontSize:18,color:"#78716c",display:"block",marginBottom:4}}/>
            <p style={{margin:0,fontSize:24,fontWeight:500,color:"#1c1917"}}>{value}</p>
            <p style={{margin:"2px 0 0",fontSize:12,color:"#78716c"}}>{label}</p>
          </div>
        ))}
      </div>
      {grouped.map(({group,regions})=>(
        <div key={group} style={{marginBottom:24}}>
          <p style={{margin:"0 0 10px",fontSize:12,fontWeight:500,color:"#78716c",textTransform:"uppercase",letterSpacing:"0.06em"}}>{group}</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
            {regions.map(r=><RegionCard key={r.id} region={r} qualifier={qualifiers[r.id]} picks={allPicks?.[r.id]} currentUser={currentUser} year={year} onClick={onSelectRegion}/>)}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Leaderboard tab ────────────────────────────────────────────────────────────
function Leaderboard({ qualifiers, allPicks }) {
  const players = useMemo(() => {
    const totals = {};
    REGIONS.forEach(r => {
      const qualifier = qualifiers[r.id];
      const regionPicks = allPicks?.[r.id]||{};
      Object.entries(regionPicks).forEach(([name, pick]) => {
        const s = scorePicks(pick, qualifier);
        totals[name] = (totals[name]||0) + s.total;
      });
    });
    return Object.entries(totals).sort((a,b)=>b[1]-a[1]).map(([name,pts],i)=>({rank:i+1,name,pts}));
  }, [qualifiers, allPicks]);

  return (
    <div>
      <div style={{border:"0.5px solid #e7e5e4",borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",background:"#f5f5f4",borderBottom:"0.5px solid #e7e5e4"}}>
          <p style={{margin:0,fontSize:13,fontWeight:500,color:"#78716c"}}>Group leaderboard — prefecture picks</p>
        </div>
        {players.length===0&&<p style={{margin:0,padding:"2rem",textAlign:"center",fontSize:13,color:"#78716c"}}>No picks submitted yet. Picks open after each bracket draw.</p>}
        {players.length>0&&players.every(p=>p.pts===0)&&<p style={{margin:0,padding:"12px 16px",fontSize:12,color:"#78716c",borderBottom:"0.5px solid #f5f5f4",background:"#fafaf9"}}>Scoring activates as qualifier results are fetched. Check back after games begin.</p>}
        {players.map(p=>(
          <div key={p.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:"0.5px solid #f5f5f4"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:p.rank===1?"#1c1917":"#f5f5f4",color:p.rank===1?"#fff":"#78716c",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,flexShrink:0}}>{p.rank}</div>
            <p style={{margin:0,flex:1,fontSize:14,fontWeight:p.rank===1?600:400}}>{p.name}</p>
            <p style={{margin:0,fontSize:16,fontWeight:600,color:p.rank===1?"#1c1917":"#78716c"}}>{p.pts} <span style={{fontSize:12,fontWeight:400}}>pts</span></p>
          </div>
        ))}
      </div>
      <p style={{fontSize:12,color:"#a8a29e",marginTop:12,textAlign:"center"}}>Scoring: QF correct = {SCORES.qf}pts · SF = {SCORES.sf}pts · Final = {SCORES.final}pts · Winner = {SCORES.winner}pts</p>
    </div>
  );
}

// ── Admin keys modal (Joel Knost only) ───────────────────────────────────────
function AdminModal({ onClose }) {
  const [apiKey, setApiKey] = useState(localStorage.getItem("koshien:admin:apikey") || "");
  const [scrapeKey, setScrapeKey] = useState(localStorage.getItem("koshien:admin:scrapekey") || "");
  const apiValid = apiKey.startsWith("sk-ant-");
  const scrapeValid = scrapeKey.length > 8;
  const bothValid = apiValid && scrapeValid;

  function save() {
    localStorage.setItem("koshien:admin:apikey", apiKey);
    localStorage.setItem("koshien:admin:scrapekey", scrapeKey);
    onClose();
    window.location.reload();
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
      <div style={{background:"#fff",borderRadius:12,padding:"1.75rem",width:400,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <p style={{margin:0,fontSize:16,fontWeight:600}}><i className="ti ti-key" style={{marginRight:6}}/>Admin keys</p>
            <p style={{margin:"2px 0 0",fontSize:12,color:"#78716c"}}>Stored in this browser only</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#78716c",lineHeight:1}}>×</button>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:500,color:"#78716c",display:"block",marginBottom:4}}>Anthropic API key</label>
          <input
            type="password"
            value={apiKey}
            onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            autoFocus
            style={{width:"100%",fontSize:13,padding:"8px 10px",border:`0.5px solid ${apiKey&&!apiValid?"#ef4444":"#d6d3d1"}`,borderRadius:6,background:"#f5f5f4"}}
          />
          {apiKey && !apiValid && <p style={{margin:"3px 0 0",fontSize:11,color:"#ef4444"}}>Must start with sk-ant-</p>}
          {apiValid && <p style={{margin:"3px 0 0",fontSize:11,color:"#16a34a"}}>✓ Valid format</p>}
        </div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:500,color:"#78716c",display:"block",marginBottom:4}}>Scrape.do token</label>
          <input
            type="password"
            value={scrapeKey}
            onChange={e=>setScrapeKey(e.target.value)}
            placeholder="Your Scrape.do token..."
            onKeyDown={e=>{ if(e.key==="Enter"&&bothValid) save(); }}
            style={{width:"100%",fontSize:13,padding:"8px 10px",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#f5f5f4"}}
          />
          {scrapeValid && <p style={{margin:"3px 0 0",fontSize:11,color:"#16a34a"}}>✓ Set</p>}
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{fontSize:13,padding:"7px 16px",border:"0.5px solid #d6d3d1",borderRadius:6,background:"#fff",cursor:"pointer",color:"#78716c"}}>Cancel</button>
          <button onClick={save} disabled={!bothValid} style={{fontSize:13,padding:"7px 16px",border:"none",borderRadius:6,background:bothValid?"#1c1917":"#e7e5e4",color:bothValid?"#fff":"#78716c",cursor:bothValid?"pointer":"not-allowed",fontWeight:500}}>Save keys</button>
        </div>
      </div>
    </div>
  );
}

// ── Pick migration: name key → email key (runs once on register) ─────────────
async function migratePicks(name, email, year) {
  try {
    const oldKey = nameKey(name);
    const newKey = emailKey(email);
    if (oldKey === newKey) return; // nothing to migrate
    const regionsSnap = await fb.get(`picks/${year}`);
    if (!regionsSnap) return;
    const migrations = [];
    Object.entries(regionsSnap).forEach(([regionId, regionPicks]) => {
      if (!regionPicks || typeof regionPicks !== "object") return;
      const oldPick = regionPicks[oldKey];
      const newPick = regionPicks[newKey];
      // Only migrate if old key has data and new key doesn't yet
      if (oldPick && !newPick) {
        migrations.push(
          fb.set(`picks/${year}/${regionId}/${newKey}`, { ...oldPick, name })
            .then(() => fb.del(`picks/${year}/${regionId}/${oldKey}`))
        );
      }
    });
    if (migrations.length > 0) {
      await Promise.all(migrations);
      console.log(`Migrated ${migrations.length} pick(s) from name key to email key`);
    }
  } catch(e) {
    console.warn("Pick migration failed (non-critical):", e.message);
  }
}

// ── Main app ──────────────────────────────────────────────────────────────────
function KoshienTracker() {
  const [year, setYear] = useState(2026);
  const [activeTab, setActiveTab] = useState("qualifiers");
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [qualifiers, setQualifiers] = useState({});
  const [allPicks, setAllPicks] = useState({});
  const [members, setMembers] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showRegister, setShowRegister] = useState(false);
  const [showAdminModal, setShowAdminModal] = useState(false);

  // Load current user from localStorage (device identity only)
  useEffect(() => {
    const me = local.get("koshien:me");
    if (me) {
      setCurrentUser(me);
      // Migrate picks for existing users silently on load
      if (me.email) migratePicks(me.name, me.email, year);
    } else {
      setShowRegister(true);
    }
  }, []);

  // Subscribe to Firebase real-time listeners for shared data
  useEffect(() => {
    setLoading(true);
    setQualifiers({});
    setAllPicks({});
    setMembers([]);

    // Real-time qualifier listener — also clears loading on first fire
    const unsubQualifiers = fb.on(`qualifiers/${year}`, data => {
      setQualifiers(data || {});
      setLoading(false); // clear loader as soon as first data arrives
    });

    // Real-time picks listener — normalize Firebase keys back to display names
    const unsubPicks = fb.on(`picks/${year}`, data => {
      if (!data) { setAllPicks({}); return; }
      // Each region's picks: { sanitizedKey: pickObj } → { playerName: pickObj }
      const normalized = {};
      Object.entries(data).forEach(([regionId, regionPicks]) => {
        normalized[regionId] = {};
        if (regionPicks && typeof regionPicks === "object") {
          Object.values(regionPicks).forEach(pick => {
            if (pick?.name) normalized[regionId][pick.name] = pick;
          });
        }
      });
      setAllPicks(normalized);
    });

    // Real-time members listener
    const unsubMembers = fb.on("members", data => {
      setMembers(data ? Object.values(data) : []);
      setLoading(false);
    });

    // Fallback: stop loader after 5s if Firebase is slow
    const fbTimeout = setTimeout(() => setLoading(false), 5000);

    return () => {
      unsubQualifiers();
      unsubPicks();
      unsubMembers();
      clearTimeout(fbTimeout);
    };
  }, [year]);

  const handleRegister = async (name, email) => {
    const me = { name, email };
    local.set("koshien:me", me);
    setCurrentUser(me);
    setShowRegister(false);
    // Key members by email — consistent across devices regardless of how name is typed
    await fb.set(`members/${emailKey(email)}`, { name, email });
    // Migrate any existing picks saved under the old name key to the new email key
    await migratePicks(name, email, year);
  };

  const handleSaveQualifier = async (regionId, data) => {
    if (data === null) {
      await fb.del(fbPath.qualifier(year, regionId));
      setQualifiers(p => { const n={...p}; delete n[regionId]; return n; });
    } else {
      await fb.set(fbPath.qualifier(year, regionId), data);
      // Real-time listener will update state, but set optimistically too
      setQualifiers(p => ({...p, [regionId]: data}));
    }
  };

  const handleSavePick = async (regionId, playerName, pick) => {
    // Key by email for consistency across devices
    const key = currentUser?.email ? emailKey(currentUser.email) : nameKey(playerName);
    await fb.set(`${fbPath.picks(year, regionId)}/${key}`, pick);
    // Optimistic update
    setAllPicks(p => ({
      ...p,
      [regionId]: { ...(p[regionId]||{}), [playerName]: pick }
    }));
  };

  const tabs = [
    { id:"qualifiers", label:"Qualifiers",   icon:"ti-map-pin" },
    { id:"tournament", label:"Koshien",       icon:"ti-trophy" },
    { id:"leaderboard",label:"Leaderboard",   icon:"ti-podium" },
  ];

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:700,margin:"0 auto",padding:"1.5rem 0"}}>
      {showRegister && <RegisterModal onRegister={handleRegister} />}
      {showAdminModal && <AdminModal onClose={()=>setShowAdminModal(false)} />}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h1 style={{margin:0,fontSize:20,fontWeight:500}}><i className="ti ti-baseball" style={{marginRight:8,fontSize:18,verticalAlign:-1}}/>Summer Koshien</h1>
          <p style={{margin:"2px 0 0",fontSize:13,color:"#78716c"}}>{year - 1918}th National High School Baseball Championship</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {currentUser&&(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:"#78716c"}}><i className="ti ti-user" style={{marginRight:4}}/>{currentUser.name}</span>
              <button onClick={()=>setShowAdminModal(true)} title="Admin settings" style={{background:"none",border:"none",cursor:"pointer",color:getApiKey()?"#78716c":"#ef4444",padding:"2px 4px",fontSize:16,lineHeight:1,display:"flex",alignItems:"center",opacity:1}}>
                <i className="ti ti-settings" style={{fontSize:16}}/>
              </button>
            </div>
          )}
          <select value={year} onChange={e=>{setYear(Number(e.target.value));setSelectedRegion(null);}} style={{fontSize:13,padding:"6px 10px",border:"0.5px solid #d6d3d1",borderRadius:6}}>
            <option value={2025}>2025 season</option>
            <option value={2026}>2026 season</option>
          </select>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"0.5px solid #e7e5e4",marginBottom:24}}>
        {tabs.map(tab=>(
          <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setSelectedRegion(null);}} style={{background:"none",border:"none",borderBottom:activeTab===tab.id?"2px solid #1c1917":"2px solid transparent",padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:500,color:activeTab===tab.id?"#1c1917":"#78716c",marginBottom:-1,display:"flex",alignItems:"center",gap:6}}>
            <i className={`ti ${tab.icon}`} style={{fontSize:14}}/>{tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      {loading ? (
        <div style={{textAlign:"center",padding:"3rem 0",color:"#78716c"}}><i className="ti ti-loader-2" style={{fontSize:20,display:"block",marginBottom:8}}/>Loading…</div>
      ) : activeTab==="qualifiers" ? (
        selectedRegion ? (
          <RegionDetail region={selectedRegion} year={year} qualifier={qualifiers[selectedRegion.id]} picks={allPicks[selectedRegion.id]} currentUser={currentUser} members={members} onBack={()=>setSelectedRegion(null)} onSaveQualifier={handleSaveQualifier} onSavePick={handleSavePick} />
        ) : (
          <QualifierGrid year={year} qualifiers={qualifiers} allPicks={allPicks} currentUser={currentUser} onSelectRegion={setSelectedRegion} />
        )
      ) : activeTab==="tournament" ? (
        <MainTournament year={year} />
      ) : (
        <Leaderboard qualifiers={qualifiers} allPicks={allPicks} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KoshienTracker />);
</script>
